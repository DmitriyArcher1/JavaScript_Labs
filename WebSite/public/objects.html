<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторная работа №4 - Тестирование</title>

    <link rel="shortcut icon" href="../icons/object.png" type="image/x-icon">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mocha@10.2.0/mocha.css">
    
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
            background: #f5f7fa;
            margin: 0;
        }
        
        #mocha {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            color: #000;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }
        
        #mocha h1 {
            font-size: 24px;
            color: #2c3e50;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
            margin-bottom: 25px;
        }
        
        #mocha .test {
            margin-bottom: 12px;
        }
        
        #mocha .test.pass .test-title {
            color: #27ae60;
        }
        
        #mocha .test.fail .test-title {
            color: #e74c3c;
        }
        
        .header-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .header-info h2 {
            margin: 0;
            font-weight: 300;
        }
        
        .header-info .badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .progress-bar {
            height: 4px;
            background: #ecf0f1;
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
        }
        
        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #27ae60, #2ecc71);
            transition: width 0.3s ease;
            width: 0%;
        }
        
        .info-box {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-family: monospace;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header-info">
        <h2>Лабораторная работа №4</h2>
        <div>
            <span class="badge">Всего тестов: <span id="totalTests">0</span></span>
            <span class="badge" style="margin-left: 10px;">Пройдено: <span id="passedTests">0</span></span>
        </div>
    </div>
    
    <div class="progress-bar">
        <div class="fill" id="progressFill"></div>
    </div>

    <div class="info-box">
        <strong>Тестирование класса Book и функций</strong>
    </div>

    <div id="mocha"></div>

    <script src="https://cdn.jsdelivr.net/npm/mocha@10.2.0/mocha.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chai@4.3.7/chai.js"></script>
    
    <script src="../../src/scripts/objects.js"></script>
    
    <script>
        mocha.setup('bdd');
        mocha.reporter('html');
        
        const { expect, assert, should } = chai;
        should();
        
        function updateStats() {
            const tests = document.querySelectorAll('#mocha .test');
            const passed = document.querySelectorAll('#mocha .test.pass');
            const failed = document.querySelectorAll('#mocha .test.fail');
            
            document.getElementById('totalTests').textContent = tests.length;
            document.getElementById('passedTests').textContent = passed.length;
            
            const progress = tests.length > 0 ? (passed.length / tests.length) * 100 : 0;
            document.getElementById('progressFill').style.width = progress + '%';
            
            const fill = document.getElementById('progressFill');
            if (failed.length > 0) {
                fill.style.background = 'linear-gradient(90deg, #e74c3c, #c0392b)';
            } else if (tests.length > 0 && passed.length === tests.length) {
                fill.style.background = 'linear-gradient(90deg, #27ae60, #2ecc71)';
            }
        }
        
        // ============================================================
        // ТЕСТЫ
        // ============================================================
        describe('Класс Book', function() {
            describe('Конструктор и свойства', function() {
                it('должен создавать объект с правильными свойствами', function() {
                    const book = new Book('Война и мир', 1869, 1500);
                    expect(book.title).to.equal('Война и мир');
                    expect(book.pubYear).to.equal(1869);
                    expect(book.price).to.equal(1500);
                });
                
                it('должен выбрасывать ошибку при пустом названии', function() {
                    expect(() => new Book('', 1869, 1500)).to.throw('Название книги не должно быть пустой строкой');
                    expect(() => new Book('   ', 1869, 1500)).to.throw('Название книги не должно быть пустой строкой');
                });
                
                it('должен выбрасывать ошибку при отрицательном годе', function() {
                    expect(() => new Book('Война и мир', -5, 1500)).to.throw('Год издания должен быть положительным целым числом');
                    expect(() => new Book('Война и мир', 0, 1500)).to.throw('Год издания должен быть положительным целым числом');
                });
                
                it('должен выбрасывать ошибку при отрицательной цене', function() {
                    expect(() => new Book('Война и мир', 1869, -100)).to.throw('Цена должна быть положительным числом');
                });
            });
            
            describe('Метод show', function() {
                it('должен выводить в консоль название и цену', function() {
                    const book = new Book('Тест', 2000, 100);
                    let output = '';
                    const originalLog = console.log;
                    console.log = function(msg) { output += msg; };
                    
                    book.show();
                    
                    console.log = originalLog;
                    expect(output).to.include('Тест');
                    expect(output).to.include('100');
                });
            });
            
            describe('Геттеры и сеттеры', function() {
                it('должен корректно обновлять свойства через сеттеры', function() {
                    const book = new Book('Война и мир', 1869, 1500);
                    book.title = 'Анна Каренина';
                    book.pubYear = 1877;
                    book.price = 1200;
                    
                    expect(book.title).to.equal('Анна Каренина');
                    expect(book.pubYear).to.equal(1877);
                    expect(book.price).to.equal(1200);
                });
                
                it('должен выбрасывать ошибку при попытке установить пустое название', function() {
                    const book = new Book('Война и мир', 1869, 1500);
                    expect(() => book.title = '').to.throw('Название книги не должно быть пустой строкой');
                });
                
                it('должен выбрасывать ошибку при попытке установить отрицательный год', function() {
                    const book = new Book('Война и мир', 1869, 1500);
                    expect(() => book.pubYear = -5).to.throw('Год издания должен быть положительным целым числом');
                });
                
                it('должен выбрасывать ошибку при попытке установить отрицательную цену', function() {
                    const book = new Book('Война и мир', 1869, 1500);
                    expect(() => book.price = -100).to.throw('Цена должна быть положительным числом');
                });
            });
            
            describe('Статический метод compare', function() {
                it('должен сортировать книги по году издания', function() {
                    const books = [
                        new Book('Книга 1', 2000, 100),
                        new Book('Книга 2', 1990, 150),
                        new Book('Книга 3', 1980, 200)
                    ];
                    
                    books.sort(Book.compare);
                    
                    expect(books[0].pubYear).to.equal(1980);
                    expect(books[1].pubYear).to.equal(1990);
                    expect(books[2].pubYear).to.equal(2000);
                });
            });
        });
        
        // ============================================================
        // ТЕСТЫ
        // ============================================================
        describe('isEmpty(obj)', function() {
            it('должна возвращать true для пустого объекта', function() {
                expect(isEmpty({})).to.be.true;
            });
            
            it('должна возвращать false для объекта со свойствами', function() {
                expect(isEmpty({ name: 'John' })).to.be.false;
                expect(isEmpty({ a: 1, b: 2 })).to.be.false;
            });
            
            it('должна возвращать false для объекта с символьными свойствами', function() {
                expect(isEmpty({ [Symbol()]: true })).to.be.false;
            });
            
            it('должна возвращать false для объекта с defineProperty', function() {
                const obj = {};
                Object.defineProperty(obj, 'name', { value: 'John' });
                expect(isEmpty(obj)).to.be.false;
            });
            
            it('должна возвращать undefined для примитивных типов', function() {
                expect(isEmpty(5)).to.be.undefined;
                expect(isEmpty('test')).to.be.undefined;
                expect(isEmpty(true)).to.be.undefined;
                expect(isEmpty(null)).to.be.undefined;
                expect(isEmpty(undefined)).to.be.undefined;
            });
        });
        
        // ============================================================
        // ТЕСТЫ
        // ============================================================
        describe('Методы addClass и removeClass', function() {
            let obj;
            
            beforeEach(function() {
                obj = {
                    className: 'open menu'
                };
                
                obj.addClass = function(cls) {
                    const classes = this.className ? this.className.split(' ') : [];
                    const trimmedCls = cls.trim();
                    
                    if (!classes.includes(trimmedCls)) {
                        classes.push(trimmedCls);
                        this.className = classes.join(' ');
                    }
                    return this;
                };
                
                obj.removeClass = function(cls) {
                    const trimmedCls = cls.trim();
                    const classes = this.className ? this.className.split(' ') : [];
                    const filtered = classes.filter(c => c !== trimmedCls);
                    this.className = filtered.join(' ');
                    return this;
                };
            });
            
            it('addClass должен добавлять новый класс', function() {
                obj.addClass('new');
                expect(obj.className).to.equal('open menu new');
            });
            
            it('addClass не должен добавлять существующий класс', function() {
                obj.addClass('open');
                expect(obj.className).to.equal('open menu');
            });
            
            it('removeClass должен удалять существующий класс', function() {
                obj.removeClass('open');
                expect(obj.className).to.equal('menu');
            });
            
            it('removeClass не должен изменять строку при удалении отсутствующего класса', function() {
                obj.removeClass('nonexistent');
                expect(obj.className).to.equal('open menu');
            });
            
            it('методы должны возвращать объект для цепочки вызовов', function() {
                const result = obj.addClass('new').removeClass('open');
                expect(result).to.equal(obj);
                expect(obj.className).to.equal('menu new');
            });
        });
        
        // ============================================================
        // ТЕСТЫ
        // ============================================================
        describe('getSecondsToday()', function() {
            it('должна возвращать число', function() {
                expect(getSecondsToday()).to.be.a('number');
            });
            
            it('должна возвращать положительное число', function() {
                expect(getSecondsToday()).to.be.greaterThan(0);
            });
            
            it('должна возвращать количество секунд от начала дня', function() {
                const now = new Date();
                const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const expected = Math.floor((now - startOfDay) / 1000);
                expect(getSecondsToday()).to.equal(expected);
            });
        });
        
        // ============================================================
        // ТЕСТЫ
        // ============================================================
        describe('formatDate(date)', function() {
            it('должна форматировать дату в формат "дд.мм.гг"', function() {
                const date = new Date(2024, 4, 11);
                expect(formatDate(date)).to.equal('11.05.24');
            });
            
            it('должна правильно форматировать даты с однозначными числами', function() {
                const date = new Date(2024, 0, 5);
                expect(formatDate(date)).to.equal('05.01.24');
            });
            
            it('должна правильно форматировать даты с двузначными числами', function() {
                const date = new Date(2024, 11, 25);
                expect(formatDate(date)).to.equal('25.12.24');
            });
        });
        
        // ============================================================
        // Запуск тестов
        // ============================================================
        mocha.run(function(failures) {
            console.log('Тестирование завершено. Ошибок:', failures);
            updateStats();
        });
        
        setTimeout(updateStats, 100);
        setTimeout(updateStats, 500);
        setTimeout(updateStats, 1000);
        setTimeout(updateStats, 2000);
    </script>
</body>
</html>
